<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Chat</title>

    <style>
        *{box-sizing:border-box}

        body{
            margin:0;
            background:#0f0f0f;
            color:#fff;
            font-family:tahoma;
        }

        #login,#chat{
            max-width:600px;
            margin:auto;
            padding:15px;
        }

        input,button{
            width:100%;
            padding:14px;
            margin-top:10px;
            border:none;
            border-radius:12px;
        }

        input{
            background:#1c1c1c;
            color:#fff;
        }

        button{
            background:#333;
            color:#fff;
            cursor:pointer;
        }

        #messages{
            height:70vh;
            overflow-y:auto;
            padding-bottom:10px;
        }

        .msg{
            background:#1b1b1b;
            padding:10px;
            border-radius:12px;
            margin-top:10px;
            word-break:break-word;
        }

        .name{
            font-weight:bold;
            margin-bottom:5px;
        }

        .msg img{
            max-width:100%;
            border-radius:10px;
            margin-top:5px;
        }
    </style>
</head>

<body>

<div id="login">
    <h2>ورود به چت</h2>
    <input id="name" placeholder="اسم خودتو وارد کن">
    <button onclick="login()">ورود</button>
</div>

<div id="chat" style="display:none">

    <div id="messages"></div>

    <input id="text" placeholder="پیام...">
    <input type="file" id="image">
    <button onclick="send()">ارسال</button>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();

    let username = "";

    /* رنگ ثابت برای هر اسم */
    function getColor(name){
        let colors = ["#ff4d4d","#4dd2ff","#ffd24d","#b84dff","#4dff88","#ff7ad9"];
        let hash = 0;
        for(let i=0;i<name.length;i++){
            hash = name.charCodeAt(i) + ((hash<<5)-hash);
        }
        return colors[Math.abs(hash % colors.length)];
    }

    /* ورود فقط با اسم */
    function login(){
        let name = document.getElementById("name").value.trim();
        if(!name){
            alert("اسم وارد کن");
            return;
        }

        username = name;

        document.getElementById("login").style.display = "none";
        document.getElementById("chat").style.display = "block";
    }

    /* ارسال پیام */
    function send(){

        let textInput = document.getElementById("text");
        let imageInput = document.getElementById("image");

        let text = textInput.value.trim();
        let file = imageInput.files[0];

        if(!text && !file) return;

        if(file){

            let reader = new FileReader();

            reader.onload = function(e){

                socket.emit("chat message",{
                    name: username,
                    text: text,
                    image: e.target.result
                });

            };

            reader.readAsDataURL(file);

        }else{

            socket.emit("chat message",{
                name: username,
                text: text
            });

        }

        textInput.value = "";
        imageInput.value = "";
    }

    /* نمایش پیام */
    function addMessage(data){

        let div = document.createElement("div");
        div.className = "msg";
        div.id = "m"+data.id;

        div.innerHTML = `
        <div class="name" style="color:${getColor(data.name)}">
            ${data.name}
        </div>
        <div>${data.text || ""}</div>
        ${data.image ? `<img src="${data.image}">` : ""}
    `;

        document.getElementById("messages").appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    /* دریافت پیام */
    socket.on("chat message", addMessage);

    /* لود پیام‌های قبلی */
    socket.on("load messages",(msgs)=>{
        msgs.forEach(addMessage);
    });

    /* حذف پیام بعد 1 دقیقه */
    socket.on("delete message",(id)=>{
        let el = document.getElementById("m"+id);
        if(el) el.remove();
    });

    /* Enter برای ارسال (موبایل + دسکتاپ) */
    document.addEventListener("keydown", function(e){
        if(e.key === "Enter"){
            send();
        }
    });

</script>

</body>
</html>
