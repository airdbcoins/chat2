<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Chat</title>

    <style>

        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            background:#0f0f0f;
            color:#fff;
            font-family:tahoma;
        }

        #login,
        #chatPage{
            max-width:600px;
            margin:auto;
            padding:15px;
        }

        h2{
            text-align:center;
        }

        input,
        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            margin-top:10px;
            font-size:15px;
        }

        input{
            background:#1e1e1e;
            color:#fff;
        }

        button{
            background:#333;
            color:#fff;
            cursor:pointer;
        }

        #messages{
            height:70vh;
            overflow:auto;
            padding-bottom:10px;
        }

        .msg{
            background:#1b1b1b;
            padding:10px;
            border-radius:14px;
            margin-top:10px;
        }

        .name{
            font-weight:bold;
            margin-bottom:5px;
        }

        .msg img{
            max-width:100%;
            border-radius:12px;
            margin-top:8px;
        }

        .bottom{
            position:sticky;
            bottom:0;
            background:#0f0f0f;
            padding-top:10px;
        }

    </style>
</head>

<body>

<div id="login">

    <h2>ورود به چت</h2>

    <input type="text" id="name" placeholder="اسم خودتو وارد کن">

    <button onclick="login()">ورود</button>

</div>

<div id="chatPage" style="display:none;">

    <div id="messages"></div>

    <div class="bottom">

        <input type="text" id="text" placeholder="پیام">

        <input type="file" id="image">

        <button onclick="send()">ارسال</button>

    </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

    const socket = io();

    let username = "";

    const colors = [
        "#ff6b6b",
        "#4ecdc4",
        "#ffe66d",
        "#5fa8ff",
        "#c77dff",
        "#ff9f1c",
        "#2ec4b6",
        "#f72585"
    ];

    function getColor(name){

        let hash = 0;

        for(let i=0;i<name.length;i++){
            hash = name.charCodeAt(i) + ((hash << 5) - hash);
        }

        return colors[Math.abs(hash % colors.length)];
    }

    function login(){

        let name = document.getElementById("name").value.trim();

        if(!name){
            alert("اسم وارد کن");
            return;
        }

        username = name;

        document.getElementById("login").style.display = "none";

        document.getElementById("chatPage").style.display = "block";
    }

    function send(){

        document.getElementById("text").addEventListener("keydown", function(e){

            if(e.key === "Enter"){

                e.preventDefault();

                send();
            }

        });
        
        let textInput = document.getElementById("text");

        let imageInput = document.getElementById("image");

        let text = textInput.value;

        let file = imageInput.files[0];

        if(!text && !file){
            return;
        }

        if(file){

            let reader = new FileReader();

            reader.onload = function(e){

                socket.emit("chat message",{
                    name: username,
                    text: text,
                    image: e.target.result
                });

            };

            reader.readAsDataURL(file);

        }else{

            socket.emit("chat message",{
                name: username,
                text: text
            });

        }

        textInput.value = "";

        imageInput.value = "";
    }

    function addMessage(data){

        let div = document.createElement("div");

        div.className = "msg";

        div.id = "m"+data.id;

        div.innerHTML = `
        <div class="name" style="color:${getColor(data.name)}">
            ${data.name}
        </div>

        <div>${data.text || ""}</div>

        ${data.image ? `<img src="${data.image}">` : ""}
    `;

        document.getElementById("messages").appendChild(div);

        let messages = document.getElementById("messages");

        messages.scrollTop = messages.scrollHeight;
    }

    socket.on("chat message", addMessage);

    socket.on("load messages",(msgs)=>{
        msgs.forEach(addMessage);
    });

    socket.on("delete message",(id)=>{
        let el = document.getElementById("m"+id);
        if(el){
            el.remove();
        }
    });


</script>

</body>
</html>
